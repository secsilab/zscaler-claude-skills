name: Secrets & Tenant Data Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for credential patterns
        run: |
          echo "=== Scanning for credential patterns ==="
          FAILED=0

          # JWT tokens
          JWT=$(grep -rnP 'eyJ[A-Za-z0-9_-]{20,}\.' --include='*.md' --include='*.json' . \
            --exclude-dir=.github --exclude-dir=.git 2>/dev/null || true)
          if [ -n "$JWT" ]; then
            echo "FAIL: Found JWT-like token:"
            echo "$JWT"
            FAILED=1
          fi

          # TOTP secrets
          TOTP=$(grep -rnP 'otpauth://' --include='*.md' --include='*.json' . \
            --exclude-dir=.github --exclude-dir=.git 2>/dev/null || true)
          if [ -n "$TOTP" ]; then
            echo "FAIL: Found TOTP secret:"
            echo "$TOTP"
            FAILED=1
          fi

          # Private keys
          KEYS=$(grep -rnP 'BEGIN (RSA |EC |OPENSSH |DSA )?PRIVATE KEY' --include='*.md' --include='*.json' . \
            --exclude-dir=.github --exclude-dir=.git 2>/dev/null || true)
          if [ -n "$KEYS" ]; then
            echo "FAIL: Found private key:"
            echo "$KEYS"
            FAILED=1
          fi

          # AWS access keys
          AWS=$(grep -rnP 'AKIA[0-9A-Z]{16}' --include='*.md' --include='*.json' . \
            --exclude-dir=.github --exclude-dir=.git 2>/dev/null || true)
          if [ -n "$AWS" ]; then
            echo "FAIL: Found AWS access key:"
            echo "$AWS"
            FAILED=1
          fi

          # Generic password patterns
          PASS=$(grep -rniP '(password|passwd|secret)\s*[:=]\s*["\x27][^"\x27]{4,}' --include='*.md' --include='*.json' . \
            --exclude-dir=.github --exclude-dir=.git 2>/dev/null || true)
          if [ -n "$PASS" ]; then
            echo "FAIL: Found password-like pattern:"
            echo "$PASS"
            FAILED=1
          fi

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "========================================="
            echo "BLOCKED: Potential secrets detected."
            echo "Fix the issues above before pushing."
            echo "========================================="
            exit 1
          fi

          echo "All clear — no secrets found."
