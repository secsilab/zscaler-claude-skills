name: Postman Collection Drift Detection

on:
  schedule:
    # Bi-monthly: 1st and 15th of each month at 09:00 UTC
    - cron: '0 9 1,15 * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  check-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check for collection updates
        id: check
        run: |
          set +e
          python3 tools/generate_endpoints.py --check 2>&1 | tee drift_report.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Generate updated endpoints
        if: steps.check.outputs.exit_code == '2'
        run: python3 tools/generate_endpoints.py 2>&1 | tee generate_report.txt

      - name: Create Pull Request
        if: steps.check.outputs.exit_code == '2'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          BRANCH="postman-update/$DATE"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add skills/*/ENDPOINTS.md skills/*/SKILL.md tools/postman_sources.json
          git diff --cached --quiet && { echo "No file changes after regeneration."; exit 0; }
          git commit -m "chore: update endpoints from Postman collections ($DATE)"
          git push origin "$BRANCH"

          REPORT=$(tail -n +3 drift_report.txt)
          gh pr create \
            --title "Postman Collection Update — $DATE" \
            --body "## Postman Collection Drift Detected

          $REPORT

          ---
          Auto-generated by postman-drift workflow." \
            --base main \
            --head "$BRANCH"

      - name: No changes detected
        if: steps.check.outputs.exit_code != '2'
        run: echo "No Postman collection changes detected. Nothing to do."
